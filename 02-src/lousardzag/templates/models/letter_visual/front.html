<div class="visual-letter-card">
    <!-- Main display: large letter -->
    <div class="letter-showcase">
        <div class="letter-forms">
            <div class="form uppercase">
                <div class="label">Uppercase</div>
                <div class="form-letter">{{LetterUppercase}}</div>
            </div>
            <div class="form lowercase">
                <div class="label">Lowercase</div>
                <div class="form-letter">{{Letter}}</div>
            </div>
        </div>
    </div>
    
    <!-- Shape description -->
    <div class="shape-description">
        <div class="section-title">Letter Shape</div>
        <div class="shape-info">{{ShapeDescription}}</div>
        <div class="stroke-order" style="margin-top: 15px;">
            <strong>Key features:</strong>
            <div class="features-list">{{KeyFeatures}}</div>
        </div>
    </div>
    
    <!-- Prompt -->
    <div class="practice-prompt">
        <strong>Can you identify this letter when you see it in an Armenian word?</strong>
    </div>
</div>
